[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --color=yes --strict-markers --strict-config
filterwarnings = 
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    gpu: marks tests requiring a CUDA GPU (deselect with '-m "not gpu"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests comparing with AleRax
    unit: marks unit tests for individual components
    gradient: marks gradient verification tests
    autograd: marks automatic differentiation tests